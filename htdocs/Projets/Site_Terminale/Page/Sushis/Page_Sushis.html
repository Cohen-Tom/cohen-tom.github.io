<!doctype html>
<html lang="fr">

        <div>
        <table id="Tableau_Sushis" border="5" align="center">
            <tr>
                <td align="center">1 pièce</td>

            <tr>
                <td align="center"><img src="Image/Sushis/Sushi.png" width="250" height="auto" >1€</td>

                    <div id="Compteur">0</div><a id="Spam" href="javascript:plus_un()">Ajoute une pair de baquettes.</a>

            </tr>

        </div>
    </body>
    
<script>
var storedItem = localStorage.getItem("storedItem");
function save(){
    var Item = document.getElementById("input").value;
    localStorage.setItem("storedItem", Item);
    document.getElementById("savedText").innerHTML = Item + " SAVED";
}
    
function get(){
    localStorage.getItem("storedItem");
    document.getElementById("openedText").innerHTML = storedItem + " OPENED";
}
    
</script>
