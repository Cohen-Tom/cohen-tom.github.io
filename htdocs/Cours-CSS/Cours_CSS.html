<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cours css</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../Icone/DEV.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Les bases de CSS</h1>
    </header>

    <main>
        <div class="flexbox">
            <h2>Flexbox</h2>
            <ul>
                <li>Boîte 1</li>
                <li>Boîte 2</li>
                <li>Boîte 3</li>
            </ul>
        </div>

        <div class="grid">
            <h2>Grid</h2>
            <div class="grid-container">
                <img src="Images/CSS.png" alt="logo CSS">
                <form action="">
                    <input type="text" id="firstName" placeholder="Prénom">
                    <input type="text" id="lastName" placeholder="Nom">
                    <textarea cols="30" rows="10" placeholder="Votre message"></textarea>
                    <input type="submit" value="Envoyer" id="btnSubmit">
                </form>
            </div>
        </div>

        <div class="absolute">
            <h2>Absolute</h2>
            <span id="circle1"></span>
            <span id="circle2"></span>
        </div>
    </main>
</body>
